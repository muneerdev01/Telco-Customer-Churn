[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
maxUploadSize = 200
enableXsrfProtection = true
port = 8501
headless = false

[client]
showErrorDetails = false
toolbarMode = "viewer"

[logger]
level = "info"
